# ================================================================
# aibak.site 中转站（New-API）独立部署清单
# 用法：把本文件夹 relay/ 放到服务器，进入后执行  docker compose up -d
# 说明：中转站程序(New-API) + 自动HTTPS(Caddy)，独立运行，不影响主站。
# ================================================================
version: "3"

services:
  # 中转站主程序：统一接各家大模型，对外提供 OpenAI 兼容接口
  newapi:
    image: calciumion/new-api:latest
    container_name: aibak-relay
    restart: always
    expose:
      - "3000"                       # 只在内部开放，由 caddy 对外
    volumes:
      - ./data:/data                 # 数据(账号/渠道/令牌/用量)存这里，别删
    environment:
      - TZ=Asia/Shanghai
      - SQL_DSN=/data/newapi.db      # 默认用本地数据库文件，够用
    networks:
      - relay-net

  # 自动 HTTPS 小工具：帮你把 relay.aibak.site 自动办好小绿锁
  caddy:
    image: caddy:latest
    container_name: aibak-relay-caddy
    restart: always
    ports:
      - "80:80"                      # 若这台服务器已被官网占用80/443，见 README 说明
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - newapi
    networks:
      - relay-net

networks:
  relay-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

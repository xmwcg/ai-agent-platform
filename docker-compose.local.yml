# docker-compose.local.yml — 本地生产级预览（无 SSL，复用已有 nginx.conf）
# 用法：docker compose -f docker-compose.local.yml up -d --build
# 访问：http://localhost:8080
# 停止：docker compose -f docker-compose.local.yml down
# 日志：docker compose -f docker-compose.local.yml logs -f

version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ai-local-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-agent-platform
    # 调试时可暴露端口（取消注释）；生产环境不暴露
    # ports:
    #   - "27017:27017"
    volumes:
      - mongodb_local_data:/data/db
    networks:
      - ai-local-network

  redis:
    image: redis:7-alpine
    container_name: ai-local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_local_data:/data
    networks:
      - ai-local-network

  # 后端服务
  server:
    build: ./server
    container_name: ai-local-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');const r=h.get('http://127.0.0.1:3000/api/health',x=>process.exit(x.statusCode===200?0:1));r.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)"]
      interval: 15s
      timeout: 4s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/ai-agent-platform
      - REDIS_URL=redis://redis:6379
      - APP_COMMIT_SHA=${APP_COMMIT_SHA:-local}
    # 挂载本地 .env.local（非生产 .env，避免覆盖）
    volumes:
      - ./server/.env.local:/usr/src/app/.env:ro
      - server_local_uploads:/usr/src/app/uploads
    networks:
      - ai-local-network

  # 前端服务（Nginx 托管静态 + 反代 /api，无 SSL）
  client:
    build: ./client
    container_name: ai-local-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server
    # 使用已有的无 SSL nginx.conf（非 nginx.ssl.runtime.conf）
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai-local-network

networks:
  ai-local-network:
    driver: bridge

volumes:
  mongodb_local_data:
  redis_local_data:
  server_local_uploads:

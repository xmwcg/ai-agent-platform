services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: ai-platform-server
    restart: always
    init: true
    env_file:
      - ${PRODUCTION_ENV_FILE}
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-unknown}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - ai-network
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: ai-platform-client
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-runtime.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/nginx/certs:ro
    networks:
      - ai-network
networks:
  ai-network:
    driver: bridge
volumes:
  server_uploads:

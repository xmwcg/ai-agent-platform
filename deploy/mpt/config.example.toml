# MoneyPrinterTurbo 生产配置模板（不含任何真实密钥）。
# 启用真实生成前：复制本文件为 config.toml，填入下方 <...> 占位符，再重建 mpt 镜像。
# config.toml 已被 .gitignore 忽略，密钥不会进入仓库。

log_level = "INFO"
listen_host = "0.0.0.0"   # 必须 0.0.0.0，否则容器外无法通过端口映射访问
listen_port = 8080

[app]
hide_config = true
edge_tts_timeout = 30
tls_verify = true
video_source = "pexels"            # pexels / pixabay / coverr

# ===== 素材库密钥（至少填一个；video_source 对应的那个必须有效）=====
pexels_api_keys = [ "<YOUR_PEXELS_KEY>", ]
pixabay_api_keys = [ "<YOUR_PIXABAY_KEY>", ]
coverr_api_keys = [ "<YOUR_COVRR_KEY>", ]

# ===== LLM（脚本生成）=====
llm_provider = "deepseek"
deepseek_api_key = "<YOUR_DEEPSEEK_KEY>"
deepseek_base_url = ""
deepseek_model_name = ""

# ===== 配音 / 字幕 =====
subtitle_provider = "edge"
voice_name = "zh-CN-XiaoxiaoNeural-Female"   # 默认中文晓晓

# endpoint：成片 URL 的前缀。留空则返回容器内相对路径 /tasks/...，仅服务端/AIBAK 后端可达。
# 若要终端用户浏览器直接打开成片，设为对外可达前缀并配置反向代理，例如：
#   endpoint = "https://aibak.site/api/mpt"
# 并在 nginx 增加：location /api/mpt/ { proxy_pass http://moneyprinterturbo:8080/; }
endpoint = ""

material_directory = ""
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""
max_concurrent_tasks = 2          # 视频合成较重，生产保守一点
max_queued_tasks = 20

[whisper]
model_size = "large-v3"
device = "cpu"
compute_type = "int8"

[proxy]

[azure]
speech_key = ""
speech_region = ""

[ui]
hide_log = true
voice_mode = "tts"
tts_server = "azure-tts-v1"
voice_name = "zh-CN-XiaoxiaoNeural-Female"
font_name = "BeVietnamPro-Bold.ttf"
subtitle_position = "top"
text_fore_color = "#000000"
font_size = 30
subtitle_background_enabled = false
subtitle_background_color = "#000000"

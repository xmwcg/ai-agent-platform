# ============================================================
# 多项目部署配置 — Auto Deploy System
# 用法：bash deploy/batch.sh deploy --all
#       bash deploy/batch.sh status
#       bash deploy/batch.sh deploy --site ai-agent-platform
# ============================================================

server:
  host: "159.75.124.59"
  user: "root"
  port: 22
  # SSH 私钥路径（留空则用密码）
  ssh_key: ""
  # 项目存放根目录
  base_path: "/opt"

sites:
  - name: "ai-agent-platform"
    path: "."
    domain: ""           # 填写域名后自动配置 SSL
    port: 80
    enabled: true
    # 如果需要不同的环境变量模板
    # env_template: "server/.env.production.example"


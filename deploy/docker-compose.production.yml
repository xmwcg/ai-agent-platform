services:
  server:
    image: ${SERVER_IMAGE:?SERVER_IMAGE must be an immutable digest reference}
    container_name: ai-platform-server
    restart: always
    init: true
    env_file:
      - ${PRODUCTION_ENV_FILE:?PRODUCTION_ENV_FILE is required}
    environment:
      NODE_ENV: production
      PORT: "3000"
      # 短视频生成 worker（MoneyPrinterTurbo）。服务在 ai-platform-network 内以
      # 服务名 moneyprinterturbo 互访；MPT 未启动时 provider 优雅返回 503，全站照常。
      MONEY_PRINTER_TURBO_URL: "http://moneyprinterturbo:8080"
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:?APP_COMMIT_SHA is required}
      SERVER_IMAGE_DIGEST: ${SERVER_IMAGE_DIGEST:?SERVER_IMAGE_DIGEST is required}
      CLIENT_IMAGE_DIGEST: ${CLIENT_IMAGE_DIGEST:?CLIENT_IMAGE_DIGEST is required}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - server_uploads:/usr/src/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      # 容器存活探活：仅验证进程存活，不依赖外部依赖（Redis/Mongo），
      # 避免长连接在受限容器中偶发哑掉时误判整个容器 unhealthy。
      # 业务依赖健康请查 /api/health（供监控/告警）。
      test: ["CMD", "node", "-e", "const h=require('http');const r=h.get('http://127.0.0.1:3000/health',x=>process.exit(x.statusCode===200?0:1));r.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)"]
      interval: 15s
      timeout: 4s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ai-platform-network

  client:
    image: ${CLIENT_IMAGE:?CLIENT_IMAGE must be an immutable digest reference}
    container_name: ai-platform-client
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_RUNTIME_CONFIG:?NGINX_RUNTIME_CONFIG is required}:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/nginx/certs:ro
      - /opt/certs-webroot:/usr/share/nginx/html/.well-known/acme-challenge:ro
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=8m
      - /tmp:size=16m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 4s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - ai-platform-network

  # ----------------------------------------------------------------------
  # MoneyPrinterTurbo 短视频生成 worker（可选启用，profiles:["mpt"]）。
  # 普通部署忽略本服务；需生成视频时在服务器执行：
  #   docker compose --profile mpt build moneyprinterturbo
  #   docker compose --profile mpt up -d moneyprinterturbo
  # 详见 deploy/mpt/README.md
  # ----------------------------------------------------------------------
  moneyprinterturbo:
    profiles: ["mpt"]
    build:
      context: ./mpt
      dockerfile: Dockerfile
    image: ${MPT_IMAGE:-ai-platform-mpt:latest}
    container_name: ai-platform-mpt
    restart: unless-stopped
    init: true
    # 仅暴露到宿主机环回，不对外网开放；AIBAK 经 docker 网络服务名访问。
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - mpt_storage:/MoneyPrinterTurbo/storage
      # 生产密钥：在服务器上创建 ./mpt/config.production.toml（含真实 key，已被 .gitignore 忽略），
      # 本挂载在运行时覆盖镜像内的默认 config.toml，无需重建镜像。
      # 注意：若文件不存在，Docker 会创建空目录导致 MPT 启动失败 —— 启用前务必先建好该文件。
      - ./mpt/config.production.toml:/MoneyPrinterTurbo/config.toml:ro
    networks:
      - ai-platform-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/v1/tasks').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  ai-platform-network:
    driver: bridge

volumes:
  server_uploads:
  mpt_storage:

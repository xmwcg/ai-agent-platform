<!doctype html>

<head>

<style>
:root{--bg:#071018;--panel:#0c1824;--panel2:#101f2d;--line:#203247;--text:#edf5ff;--muted:#8fa5bb;--cyan:#4ad9d9;--green:#58d6a6;--yellow:#f4cf57;--red:#ff7785;--shadow:0 18px 60px rgba(0,0,0,.28)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--text);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 85% 0,#173451 0,transparent 34%),radial-gradient(circle at 10% 12%,#142d32 0,transparent 28%),var(--bg)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.24;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:28px 28px}.wrap{position:relative;max-width:1500px;margin:auto;padding:26px}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:22px;margin-bottom:17px}.eyebrow{color:var(--cyan);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}.title{margin:6px 0;font-size:34px;line-height:1.12;letter-spacing:-.03em}.sub{color:var(--muted);font-size:13px;line-height:1.6}.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}.live{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(12,24,36,.72);padding:9px 12px;border-radius:12px;font-size:12px;color:var(--muted)}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}button,input{font:inherit}button{border:1px solid #31506c;background:linear-gradient(145deg,#18334a,#102638);color:var(--text);border-radius:12px;padding:10px 15px;cursor:pointer;transition:.18s}button:hover{transform:translateY(-1px);border-color:var(--cyan)}button:disabled{opacity:.55;cursor:wait}.brand{min-width:275px}.header-tools{display:flex;align-items:flex-start;gap:12px;margin-left:auto}.filter-panel{width:min(760px,58vw);border:1px solid var(--line);background:linear-gradient(145deg,rgba(16,31,45,.97),rgba(9,21,32,.97));border-radius:16px;padding:12px 13px;box-shadow:var(--shadow)}.filter-top{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}.filter-top label{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}.filter-top select{display:block;width:100%;margin-top:4px}.time-row{display:grid;grid-template-columns:34px 1fr;align-items:center;gap:7px;margin-top:7px}.time-row>span{font-size:10px;color:var(--muted)}.date-selects{display:grid;grid-template-columns:1.35fr repeat(4,1fr);gap:5px}.date-selects select,.filter-top select{min-width:0;border:1px solid var(--line);background:#091724;color:var(--text);border-radius:9px;padding:7px 6px;outline:none;font-size:11px}.date-selects select:focus,.filter-top select:focus{border-color:var(--cyan)}.filter-bottom{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:9px}.filter-bottom>span{font-size:10px;color:#b8cce0;line-height:1.4}.small-btn{padding:7px 10px;border-radius:9px;font-size:10px;margin-left:5px}.small-btn.secondary{background:#0b1b29;color:var(--muted)}.filter-error{min-height:0;color:var(--red);font-size:10px;margin-top:5px}.filter-error:not(:empty){min-height:14px}.actions{flex-direction:column;align-items:stretch}.actions button{white-space:nowrap}
.security{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border:1px solid rgba(88,214,166,.24);background:rgba(30,90,73,.14);border-radius:14px;color:#bfe8d8;font-size:12px;margin-bottom:16px}.security b{color:var(--green)}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.kpi,.panel,.agent-card{border:1px solid var(--line);background:linear-gradient(145deg,rgba(16,31,45,.96),rgba(9,21,32,.96));box-shadow:var(--shadow)}.kpi{padding:16px;border-radius:16px;min-width:0}.kpi-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}.kpi-value{font-size:24px;font-weight:800;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi small{display:block;color:var(--muted);font-size:10px;margin-top:3px}.panel{border-radius:19px;padding:18px;margin-top:15px}.panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;margin-bottom:14px}.panel-title{margin:0;font-size:16px}.panel-note{color:var(--muted);font-size:11px;margin-top:4px}.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end}.legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}.legend i{width:8px;height:8px;border-radius:50%}.chart-shell{height:278px;position:relative}.chart-shell svg{display:block;width:100%;height:100%;overflow:visible}.gridline{stroke:#24384d;stroke-width:1}.axis-label{fill:#7890a7;font-size:10px}.bar-segment{transition:opacity .16s}.bar-segment:hover{opacity:.76}.chart-empty{height:100%;display:grid;place-items:center;color:var(--muted)}
.agents{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.agent-card{border-radius:17px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}.agent-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--agent)}.agent-card:hover,.agent-card.active{transform:translateY(-2px);border-color:var(--agent);box-shadow:0 16px 42px color-mix(in srgb,var(--agent) 16%,transparent)}.agent-top{display:flex;justify-content:space-between;gap:12px}.agent-name{font-weight:800;font-size:16px}.agent-version{font-size:10px;color:var(--muted);margin-top:4px;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.status{font-size:10px;border:1px solid rgba(88,214,166,.25);color:var(--green);background:rgba(88,214,166,.08);padding:4px 7px;border-radius:999px;height:max-content}.status.off{color:var(--red);border-color:rgba(255,119,133,.25);background:rgba(255,119,133,.08)}.agent-token{font-size:24px;font-weight:850;margin:17px 0 2px}.mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:13px}.mini-stat{border-top:1px solid var(--line);padding-top:8px}.mini-stat b{display:block;font-size:13px}.mini-stat span{font-size:9px;color:var(--muted)}
.detail-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:15px}.detail-hero{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.detail-name{font-size:22px;font-weight:850}.detail-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.badge{font-size:10px;color:#b9c9d8;border:1px solid var(--line);background:#122435;padding:5px 8px;border-radius:999px}.badge.good{color:var(--green);border-color:rgba(88,214,166,.28)}.badge.warn{color:var(--yellow);border-color:rgba(244,207,87,.28)}.usage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:16px}.usage-box{padding:11px;border:1px solid var(--line);border-radius:12px;background:rgba(5,14,22,.34)}.usage-box span{font-size:9px;color:var(--muted);display:block}.usage-box b{font-size:14px;display:block;margin-top:4px}.section{margin-top:18px}.section-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#bfd0e1;margin-bottom:9px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:13px}table{width:100%;border-collapse:collapse;min-width:680px}th{text-align:left;color:var(--muted);font-size:10px;font-weight:600;background:#0e1d2a;padding:10px}td{font-size:11px;padding:10px;border-top:1px solid rgba(32,50,71,.72);vertical-align:top}.right{text-align:right}.mono{font-family:"Cascadia Code",Consolas,monospace;word-break:break-all;color:#b8cce0}.model-chips,.skill-list{display:flex;flex-wrap:wrap;gap:6px}.chip{font-size:10px;border:1px solid #29435b;background:#12283a;padding:5px 8px;border-radius:999px;color:#c4d5e5}.mcp-list{display:grid;gap:8px}.mcp{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(5,14,22,.3)}.mcp-top{display:flex;justify-content:space-between;gap:9px}.mcp-name{font-size:12px;font-weight:750}.mcp-meta{font-size:9px;color:var(--muted);margin-top:4px;word-break:break-all}.search{width:100%;border:1px solid var(--line);background:#091724;color:var(--text);border-radius:11px;padding:9px 11px;outline:none;margin-bottom:9px}.search:focus{border-color:var(--cyan)}.skills-box{max-height:265px;overflow:auto}.source-list{font-size:10px;color:var(--muted);line-height:1.7;word-break:break-all}.empty{color:var(--muted);font-size:12px;padding:22px;text-align:center}.error{color:var(--red)}.loading{min-height:300px;display:grid;place-items:center;color:var(--muted)}
@media(max-width:1250px){.header{flex-direction:column}.header-tools{width:100%;margin-left:0}.filter-panel{width:100%}.actions{flex-direction:row}.kpis{grid-template-columns:repeat(3,1fr)}.agents{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}.usage-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.wrap{padding:15px}.header{flex-direction:column}.header-tools{flex-direction:column}.filter-panel{width:100%}.filter-top{grid-template-columns:1fr}.date-selects{grid-template-columns:1.3fr repeat(2,1fr);gap:6px}.date-selects select:nth-child(4),.date-selects select:nth-child(5){grid-column:auto}.filter-bottom{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start;flex-direction:row}.title{font-size:27px}.kpis{grid-template-columns:repeat(2,1fr)}.agents{grid-template-columns:1fr}.panel{padding:14px}.chart-shell{height:235px}.usage-grid{grid-template-columns:repeat(2,1fr)}.detail-hero{flex-direction:column}.legend{justify-content:flex-start}.kpi-value{font-size:20px}}
</style>
</head>
<body>
<main class="wrap">
  <header class="header">
    <div class="brand"><div class="eyebrow">Local AI Operations</div><h1 class="title">AI Agent Observatory</h1><div class="sub" id="meta">正在扫描本机 Agent、模型与 Token 日志…</div></div>
    <div class="header-tools">
      <div class="filter-panel" aria-label="Token 统计筛选">
        <div class="filter-top">
          <label>统计对象<select id="agentFilter"><option value="all">本机全部</option></select></label>
          <label>模型<select id="modelFilter"><option value="all">全部模型</option></select></label>
        </div>
        <div class="time-row"><span>开始</span><div class="date-selects" id="startFields"></div></div>
        <div class="time-row"><span>结束</span><div class="date-selects" id="endFields"></div></div>
        <div class="filter-bottom"><span id="filterSummary">最近 6 个月 · 本机全部 · 全部模型</span><div><button class="small-btn secondary" id="resetFilters">恢复半年</button><button class="small-btn" id="applyFilters">应用统计</button></div></div>
        <div class="filter-error" id="filterError"></div>
      </div>
      <div class="actions"><div class="live"><i class="dot"></i>仅本机 127.0.0.1</div><button id="refresh">重新扫描</button></div>
    </div>
  </header>
  <div class="security"><b>安全脱敏</b><span>API Key、Token、Authorization、密码只显示“已配置/未配置”，页面和接口均不返回具体值。</span></div>
  <section class="kpis" id="kpis"></section>
  <section class="panel"><div class="panel-head"><div><h2 class="panel-title">本机 Agent</h2><div class="panel-note">点击卡片查看模型厂商、Base URL、Skills 与 MCP</div></div></div><div class="agents" id="agents"></div></section>
  <section class="panel"><div class="panel-head"><div><h2 class="panel-title">最近 6 个月 Token 用量</h2><div class="panel-note" id="chartNote">按 Agent 堆叠；数据来自各 Agent 本机会话日志</div></div><div class="legend" id="legend"></div></div><div class="chart-shell" id="chart"><div class="loading">读取中…</div></div></section>
  <section class="panel" id="detail"><div class="loading">正在准备详细信息…</div></section>
</main>
<script>
const $=s=>document.querySelector(s), fmt=n=>new Intl.NumberFormat('zh-CN',{notation:Math.abs(n||0)>=1e6?'compact':'standard',maximumFractionDigits:1}).format(n||0), exact=n=>new Intl.NumberFormat('zh-CN').format(n||0);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dateFmt=s=>{if(!s)return '—';const d=new Date(s);return Number.isNaN(d.getTime())?'—':d.toLocaleString('zh-CN',{hour12:false,timeZone:'UTC'})+' UTC'};
const color=c=>/^#[0-9a-f]{6}$/i.test(c||'')?c:'#4ad9d9';
const metricKeys=['inputTokens','outputTokens','cacheReadTokens','cacheCreationTokens','reasoningTokens','totalTokens'];
let state=null, view=null, selected='codex', skillQuery='', filterBounds=null, filters={start:0,end:0,agent:'all',model:'all'}, controlsBound=false;
function blankMetrics(){return {inputTokens:0,outputTokens:0,cacheReadTokens:0,cacheCreationTokens:0,reasoningTokens:0,totalTokens:0,models:{}}}
function addMetrics(target,source){metricKeys.forEach(k=>target[k]+=Number(source?.[k]||0));return target}
function allModelsForAgent(a){const values=new Set(a.models||[]);Object.keys(state.usage.totalsByAgent?.[a.id]?.models||{}).forEach(x=>values.add(x));(state.usage.sessions||[]).filter(s=>s.agent===a.id).forEach(s=>(s.models||[]).forEach(x=>values.add(x)));return [...values].sort((a,b)=>a.localeCompare(b,'zh-CN'))}
function scopedAgents(){let rows=filters.agent==='all'?state.agents:state.agents.filter(a=>a.id===filters.agent);if(filters.model!=='all')rows=rows.filter(a=>allModelsForAgent(a).includes(filters.model));return rows}
function metricFromSession(session,model){if(model==='all')return session;const row=session.modelBreakdowns?.[model];if(row)return row;if((session.models||[]).length===1&&session.models[0]===model)return session;return null}
function monthKeysBetween(start,end){const rows=[];let d=new Date(Date.UTC(start.getUTCFullYear(),start.getUTCMonth(),1));const last=Date.UTC(end.getUTCFullYear(),end.getUTCMonth(),1);while(d.getTime()<=last&&rows.length<24){rows.push(`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`);d=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,1))}return rows}
function buildView(){const start=new Date(filters.start),end=new Date(filters.end),agentIds=new Set(scopedAgents().map(a=>a.id)),totalsByAgent={};state.agents.forEach(a=>totalsByAgent[a.id]=blankMetrics());const monthMap=new Map(monthKeysBetween(start,end).map(period=>[period,{period,agents:{}}]));const sessions=[];(state.usage.sessions||[]).forEach(session=>{const timestamp=Date.parse(session.lastActivity||'');if(!Number.isFinite(timestamp)||timestamp<filters.start||timestamp>filters.end||!agentIds.has(session.agent))return;const metrics=metricFromSession(session,filters.model);if(!metrics)return;const target=totalsByAgent[session.agent];addMetrics(target,metrics);if(filters.model==='all'){Object.entries(session.modelBreakdowns||{}).forEach(([name,row])=>addMetrics(target.models[name]||(target.models[name]=blankMetrics()),row))}else{addMetrics(target.models[filters.model]||(target.models[filters.model]=blankMetrics()),metrics)}const d=new Date(timestamp),period=`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`,month=monthMap.get(period);if(month)addMetrics(month.agents[session.agent]||(month.agents[session.agent]=blankMetrics()),metrics);sessions.push({...session,_metrics:metrics})});const grand=blankMetrics();scopedAgents().forEach(a=>addMetrics(grand,totalsByAgent[a.id]));view={months:[...monthMap.values()],totalsByAgent,totals:grand,sessions}}
function totals(a){return view?.totalsByAgent?.[a?.id]||blankMetrics()}
function shortDate(ms){return new Date(ms).toLocaleString('zh-CN',{timeZone:'UTC',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function rangeLabel(){const object=filters.agent==='all'?'本机全部':state.agents.find(a=>a.id===filters.agent)?.name||'本机全部';const model=filters.model==='all'?'全部模型':filters.model;return `${shortDate(filters.start)} — ${shortDate(filters.end)} UTC · ${object} · ${model}`}
function setOptions(select,rows,value){select.innerHTML='';rows.forEach(([v,label])=>select.add(new Option(label,v)));if(rows.some(([v])=>String(v)===String(value)))select.value=String(value)}
function updateDayOptions(prefix,value){const y=Number($(`#${prefix}Year`).value),m=Number($(`#${prefix}Month`).value),days=new Date(Date.UTC(y,m,0)).getUTCDate(),select=$(`#${prefix}Day`),day=Math.min(Number(value||select.value||1),days);setOptions(select,Array.from({length:days},(_,i)=>[i+1,`${String(i+1).padStart(2,'0')}日`]),day)}
function renderDateFields(prefix,date){const box=$(`#${prefix}Fields`);box.innerHTML=['Year','Month','Day','Hour','Minute'].map(part=>`<select id="${prefix}${part}" aria-label="${prefix==='start'?'开始':'结束'}${part}"></select>`).join('');const minYear=new Date(filterBounds.min).getUTCFullYear(),maxYear=new Date(filterBounds.max).getUTCFullYear();setOptions($(`#${prefix}Year`),Array.from({length:maxYear-minYear+1},(_,i)=>[minYear+i,`${minYear+i}年`]),date.getUTCFullYear());setOptions($(`#${prefix}Month`),Array.from({length:12},(_,i)=>[i+1,`${String(i+1).padStart(2,'0')}月`]),date.getUTCMonth()+1);updateDayOptions(prefix,date.getUTCDate());setOptions($(`#${prefix}Hour`),Array.from({length:24},(_,i)=>[i,`${String(i).padStart(2,'0')}时`]),date.getUTCHours());setOptions($(`#${prefix}Minute`),Array.from({length:60},(_,i)=>[i,`${String(i).padStart(2,'0')}分`]),date.getUTCMinutes());$(`#${prefix}Year`).onchange=()=>updateDayOptions(prefix);$(`#${prefix}Month`).onchange=()=>updateDayOptions(prefix)}
function readDateFields(prefix,isEnd=false){return Date.UTC(Number($(`#${prefix}Year`).value),Number($(`#${prefix}Month`).value)-1,Number($(`#${prefix}Day`).value),Number($(`#${prefix}Hour`).value),Number($(`#${prefix}Minute`).value),isEnd?59:0,isEnd?999:0)}
function availableModels(agentId){const agents=agentId==='all'?state.agents:state.agents.filter(a=>a.id===agentId);return [...new Set(agents.flatMap(allModelsForAgent))].sort((a,b)=>a.localeCompare(b,'zh-CN'))}
function populateModelFilter(agentId,value='all'){const rows=[['all','全部模型'],...availableModels(agentId).map(x=>[x,x])];setOptions($('#modelFilter'),rows,rows.some(([v])=>v===value)?value:'all')}
function setupFilterControls(){setOptions($('#agentFilter'),[['all','本机全部'],...state.agents.map(a=>[a.id,a.name])],filters.agent);populateModelFilter(filters.agent,filters.model);renderDateFields('start',new Date(filters.start));renderDateFields('end',new Date(filters.end));if(!controlsBound){$('#agentFilter').onchange=e=>populateModelFilter(e.target.value,'all');$('#applyFilters').onclick=()=>{const start=readDateFields('start'),end=readDateFields('end',true);if(start>end){$('#filterError').textContent='开始时间不能晚于结束时间。';return}$('#filterError').textContent='';filters={start,end,agent:$('#agentFilter').value,model:$('#modelFilter').value};const rows=filters.agent==='all'?state.agents:state.agents.filter(a=>a.id===filters.agent);if(filters.model!=='all'){const match=rows.find(a=>allModelsForAgent(a).includes(filters.model));if(match)selected=match.id}else if(filters.agent!=='all')selected=filters.agent;render()};$('#resetFilters').onclick=()=>{filters={start:filterBounds.min,end:filterBounds.max,agent:'all',model:'all'};selected=state.agents[0]?.id||'';$('#filterError').textContent='';setupFilterControls();render()};controlsBound=true}}
function renderKpis(){const agents=scopedAgents(),installed=agents.filter(a=>a.installed).length,vendors=new Set(agents.flatMap(a=>a.providers.map(p=>p.vendor))),models=filters.model==='all'?new Set(agents.flatMap(allModelsForAgent)):new Set([filters.model]),skills=new Set(agents.flatMap(a=>a.skills.map(s=>s.name))),mcps=agents.reduce((n,a)=>n+a.mcps.length,0);const k=[['筛选总 Token',fmt(view.totals.totalTokens),exact(view.totals.totalTokens)],['已安装 Agent',`${installed}/${agents.length}`,'当前统计对象'],['模型厂商',vendors.size,'当前对象去重'],['模型名称',models.size,filters.model==='all'?'配置与日志合并':'当前单一模型'],['Skills',skills.size,'当前对象全局去重'],['MCP',mcps,'当前对象配置合计']];$('#kpis').innerHTML=k.map(x=>`<div class="kpi"><div class="kpi-label">${x[0]}</div><div class="kpi-value" title="${esc(x[2])}">${x[1]}</div><small>${esc(x[2])}</small></div>`).join('')}
function renderChart(){const months=view.months||[],agents=scopedAgents().filter(a=>a.installed);$('#legend').innerHTML=agents.map(a=>`<span><i style="background:${color(a.color)}"></i>${esc(a.name)}</span>`).join('');$('#chartNote').textContent=`精确到分钟，按会话最后活动时间归属；${filters.model==='all'?'全部模型':`模型 ${filters.model}`}`;if(!months.length||!agents.length){$('#chart').innerHTML='<div class="chart-empty">当前筛选范围没有数据</div>';return}const W=1100,H=250,p={l:55,r:14,t:10,b:34},cw=W-p.l-p.r,ch=H-p.t-p.b,gap=months.length>8?10:24,bw=Math.max(12,Math.min(100,(cw-gap*(months.length-1))/months.length)),max=Math.max(1,...months.map(m=>agents.reduce((sum,a)=>sum+(m.agents?.[a.id]?.totalTokens||0),0))),ticks=[0,.25,.5,.75,1];let svg=ticks.map(v=>{const y=p.t+ch*(1-v);return `<line class="gridline" x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}"/><text class="axis-label" x="${p.l-8}" y="${y+3}" text-anchor="end">${fmt(max*v)}</text>`}).join('');months.forEach((m,i)=>{const used=bw*months.length+gap*(months.length-1),x=p.l+(cw-used)/2+i*(bw+gap);let y=p.t+ch;const total=agents.reduce((sum,a)=>sum+(m.agents?.[a.id]?.totalTokens||0),0);agents.forEach(a=>{const value=m.agents?.[a.id]?.totalTokens||0,h=value/max*ch;if(h>0){y-=h;svg+=`<rect class="bar-segment" x="${x}" y="${y}" width="${bw}" height="${Math.max(h,1)}" rx="4" fill="${color(a.color)}"><title>${esc(m.period)} · ${esc(a.name)} · ${exact(value)}</title></rect>`}});svg+=`<text class="axis-label" x="${x+bw/2}" y="${H-11}" text-anchor="middle">${esc(m.period.slice(2))}</text><text class="axis-label" x="${x+bw/2}" y="${Math.max(9,y-6)}" text-anchor="middle">${fmt(total)}</text>`});$('#chart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="筛选时间范围内按 Agent 堆叠 Token 图">${svg}</svg>`}
function renderAgents(){const agents=scopedAgents(),max=Math.max(1,...agents.map(a=>totals(a).totalTokens));if(!agents.length){$('#agents').innerHTML='<div class="empty">没有与当前模型匹配的 Agent</div>';return}if(!agents.some(a=>a.id===selected))selected=agents[0].id;$('#agents').innerHTML=agents.map(a=>{const u=totals(a),key=a.apiKeyConfigured?'Key 已配置':'Key 未配置';return `<article class="agent-card ${a.id===selected?'active':''}" data-id="${esc(a.id)}" style="--agent:${color(a.color)}"><div class="agent-top"><div><div class="agent-name">${esc(a.name)}</div><div class="agent-version" title="${esc(a.version)}">${esc(a.version)}</div></div><span class="status ${a.installed?'':'off'}">${a.installed?'已安装':'未安装'}</span></div><div class="agent-token" title="${exact(u.totalTokens)}">${fmt(u.totalTokens)}</div><div class="sub">筛选范围 Token · ${u.totalTokens?'已读取本地日志':'当前范围无用量'}</div><div style="height:3px;background:#142536;border-radius:3px;margin-top:12px"><div style="height:100%;width:${u.totalTokens/max*100}%;background:${color(a.color)};border-radius:3px"></div></div><div class="mini-stats"><div class="mini-stat"><b>${a.providers.length}</b><span>厂商</span></div><div class="mini-stat"><b>${filters.model==='all'?allModelsForAgent(a).length:1}</b><span>模型</span></div><div class="mini-stat"><b>${a.skills.length}</b><span>技能</span></div><div class="mini-stat"><b>${a.mcps.length}</b><span>MCP</span></div></div><div class="detail-badges"><span class="badge ${a.apiKeyConfigured?'good':'warn'}">${key}</span></div></article>`}).join('');document.querySelectorAll('.agent-card').forEach(el=>el.onclick=()=>{selected=el.dataset.id;skillQuery='';renderAgents();renderDetail();$('#detail').scrollIntoView({behavior:'smooth',block:'start'})})}
function renderProviders(a){let providers=a.providers||[];if(filters.model!=='all'){const matched=providers.filter(p=>(p.models||[]).includes(filters.model));if(matched.length)providers=matched}if(!providers.length)return '<div class="empty">未发现模型厂商配置</div>';return `<div class="table-wrap"><table><thead><tr><th>厂商 / 配置名</th><th>Base URL</th><th>模型名称</th><th>协议</th><th>API Key</th></tr></thead><tbody>${providers.map(p=>{let models=p.models||[];if(filters.model!=='all'&&models.includes(filters.model))models=[filters.model];return `<tr><td><b>${esc(p.vendor)}</b><br><span class="sub">${esc(p.name)}</span></td><td class="mono">${esc(p.baseUrl||'默认端点')}</td><td><div class="model-chips">${models.length?models.map(m=>`<span class="chip">${esc(m)}</span>`).join(''):'<span class="sub">未指定</span>'}</div></td><td>${esc(p.protocol||'—')}</td><td><span class="badge ${p.apiKeyConfigured?'good':'warn'}">${p.apiKeyConfigured?'已配置':'未配置'}</span></td></tr>`}).join('')}</tbody></table></div>`}
function renderMcps(a){if(!a.mcps.length)return '<div class="empty">未发现 MCP 配置</div>';return `<div class="mcp-list">${a.mcps.map(m=>`<div class="mcp"><div class="mcp-top"><span class="mcp-name">${esc(m.name)}</span><span class="badge ${m.enabled?'good':'warn'}">${m.enabled?'启用':'停用'}</span></div><div class="mcp-meta">${esc(m.transport)} · ${esc(m.endpoint||'无入口')} · 凭据${m.credentialConfigured?'已配置':'未配置'}</div></div>`).join('')}</div>`}
function filteredSkills(a){const q=skillQuery.trim().toLowerCase();return q?a.skills.filter(s=>s.name.toLowerCase().includes(q)||s.path.toLowerCase().includes(q)):a.skills}
function renderSkillsOnly(){const a=state.agents.find(x=>x.id===selected);if(!a)return;const rows=filteredSkills(a);$('#skillsList').innerHTML=rows.length?rows.map(s=>`<span class="chip" title="${esc(s.path)}">${esc(s.name)}</span>`).join(''):'<div class="empty">没有匹配的 Skill</div>';$('#skillCount').textContent=`${rows.length}/${a.skills.length}`}
function renderModelUsage(a){const rows=Object.entries(totals(a).models||{}).sort((x,y)=>(y[1].totalTokens||0)-(x[1].totalTokens||0));if(!rows.length)return '<div class="empty">当前筛选范围未发现模型级用量</div>';return `<div class="table-wrap"><table><thead><tr><th>模型</th><th class="right">输入</th><th class="right">输出</th><th class="right">缓存</th><th class="right">总量</th></tr></thead><tbody>${rows.map(([name,u])=>`<tr><td>${esc(name)}</td><td class="right">${fmt(u.inputTokens)}</td><td class="right">${fmt(u.outputTokens)}</td><td class="right">${fmt(u.cacheReadTokens)}</td><td class="right"><b>${fmt(u.totalTokens)}</b></td></tr>`).join('')}</tbody></table></div>`}
function renderSessions(a){const rows=(view.sessions||[]).filter(s=>s.agent===a.id).slice(0,20);if(!rows.length)return '<div class="empty">当前筛选范围没有可展示的会话日志</div>';return `<div class="table-wrap"><table><thead><tr><th>最后活动</th><th>模型</th><th class="right">输入</th><th class="right">输出</th><th class="right">推理</th><th class="right">缓存</th><th class="right">总量</th></tr></thead><tbody>${rows.map(s=>{const u=s._metrics||s;return `<tr><td>${esc(dateFmt(s.lastActivity))}</td><td>${esc(filters.model==='all'?(s.models||[]).join(', ')||'—':filters.model)}</td><td class="right">${fmt(u.inputTokens)}</td><td class="right">${fmt(u.outputTokens)}</td><td class="right">${fmt(u.reasoningTokens)}</td><td class="right">${fmt(u.cacheReadTokens)}</td><td class="right"><b>${fmt(u.totalTokens)}</b></td></tr>`}).join('')}</tbody></table></div>`}
function renderDetail(){const agents=scopedAgents(),a=agents.find(x=>x.id===selected)||agents[0];if(!a){$('#detail').innerHTML='<div class="empty">当前筛选没有 Agent 详细信息</div>';return}selected=a.id;const u=totals(a),modelBadge=filters.model==='all'?`${allModelsForAgent(a).length} 模型`:`模型 ${filters.model}`;$('#detail').innerHTML=`<div class="detail-hero"><div><div class="eyebrow">Agent Detail</div><div class="detail-name" style="color:${color(a.color)}">${esc(a.name)}</div><div class="sub">${esc(a.version)} · ${u.totalTokens?'当前筛选范围已统计':'当前筛选范围无用量'}</div><div class="detail-badges"><span class="badge ${a.installed?'good':'warn'}">${a.installed?'已安装':'未安装'}</span><span class="badge ${a.apiKeyConfigured?'good':'warn'}">API Key ${a.apiKeyConfigured?'已配置':'未配置'}</span><span class="badge">${a.providers.length} 厂商</span><span class="badge">${esc(modelBadge)}</span></div></div><div><div class="kpi-label">筛选范围总量</div><div class="kpi-value">${fmt(u.totalTokens)}</div></div></div><div class="usage-grid">${[['输入',u.inputTokens],['输出',u.outputTokens],['缓存读取',u.cacheReadTokens],['缓存写入',u.cacheCreationTokens],['推理',u.reasoningTokens]].map(x=>`<div class="usage-box"><span>${x[0]}</span><b title="${exact(x[1])}">${fmt(x[1])}</b></div>`).join('')}</div><div class="section"><div class="section-title">模型厂商与 Base URL</div>${renderProviders(a)}</div><div class="section"><div class="section-title">筛选范围模型用量</div>${renderModelUsage(a)}</div><div class="detail-grid"><div><div class="section"><div class="section-title">Skills <span id="skillCount" class="sub"></span></div><input id="skillSearch" class="search" placeholder="搜索 Skill 名称或路径" value="${esc(skillQuery)}"><div class="skills-box"><div class="skill-list" id="skillsList"></div></div></div><div class="section"><div class="section-title">筛选范围会话</div>${renderSessions(a)}</div></div><aside><div class="section"><div class="section-title">MCP 配置</div>${renderMcps(a)}</div><div class="section"><div class="section-title">扫描来源</div><div class="source-list">${a.configPaths.length?a.configPaths.map(p=>`<div>${esc(p)}</div>`).join(''):'未发现配置文件'}</div></div></aside></div>`;renderSkillsOnly();$('#skillSearch').oninput=e=>{skillQuery=e.target.value;renderSkillsOnly()}}
function render(){buildView();renderKpis();renderAgents();renderChart();renderDetail();$('#filterSummary').textContent=rangeLabel();$('#meta').textContent=`${state.hostname} · ${state.agents.length} 个 Agent · 更新 ${dateFmt(state.generatedAt)}`}
function updateBounds(){const first=state.usage.months?.[0]?.period,minimum=first?Date.parse(`${first}-01T00:00:00Z`):Date.now()-183*864e5,maximum=Date.parse(state.generatedAt)||Date.now(),followLatest=!filterBounds||filters.end>=filterBounds.max-60000;filterBounds={min:minimum,max:maximum};if(!filters.start)filters.start=minimum;if(!filters.end||followLatest)filters.end=maximum;filters.start=Math.max(filters.start,minimum);filters.end=Math.min(filters.end,maximum)}
async function load(force=false){const btn=$('#refresh');btn.disabled=true;btn.textContent=force?'重新扫描中…':'读取中…';try{const r=await fetch(`/api/data${force?'?refresh=1':''}`,{cache:'no-store'}),body=await r.json();if(!r.ok)throw new Error(body.error||r.statusText);if(body.security?.secretsExposed!==false)throw new Error('安全脱敏检查未通过');const firstLoad=!state;state=body;updateBounds();if(!state.agents.some(a=>a.id===selected))selected=state.agents[0]?.id;if(firstLoad||force)setupFilterControls();render()}catch(e){$('#meta').innerHTML=`<span class="error">读取失败：${esc(e.message)}</span>`;if(!state)$('#detail').innerHTML=`<div class="empty error">${esc(e.message)}</div>`}finally{btn.disabled=false;btn.textContent='重新扫描'}}
$('#refresh').onclick=()=>load(true);load();setInterval(()=>load(false),60000);
</script>

# docker-compose.dev.yml — 本地开发环境（仅 MongoDB + Redis）
# 用法：docker compose -f docker-compose.dev.yml up -d
# 然后npm run dev 启动前后端（Vite 5173 + Express 3000），直连本机 27017/6379
# 停止：docker compose -f docker-compose.dev.yml down

version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ai-dev-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-agent-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - ai-dev-network

  redis:
    image: redis:7-alpine
    container_name: ai-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - ai-dev-network

networks:
  ai-dev-network:
    driver: bridge

volumes:
  mongodb_dev_data:
  redis_dev_data:

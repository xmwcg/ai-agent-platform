# ─── 安全响应头映射（所有 server 块公用） ───
map $uri $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

# 默认 catch-all（IP 直连 / 未知域名）— 正常服务，不强制 HTTPS
server {
    listen 80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # ─── 安全响应头 ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;  # 废弃但保留兼容（现代浏览器用 CSP）
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy $csp_header always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $backend "server:3000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 显式透传 Authorization（Bearer Token），确保后端 requireAuth 能稳定拿到登录态
        proxy_set_header Authorization $http_authorization;
        # 安全加固：限制请求体大小 + 缓冲配置（防慢速攻击）
        client_max_body_size 10m;
        proxy_buffering on;
        proxy_read_timeout 60s;
        # 强制 UTF-8 编码，解决知识库等中文内容乱码问题
        charset utf-8;
    }
}

# aibak.site — HTTP 重定向到 HTTPS + ACME 挑战
server {
    listen 80;
    server_name aibak.site www.aibak.site;

    # ACME 证书挑战
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# aibak.site — HTTPS 服务
server {
    listen 443 ssl http2;
    server_name aibak.site www.aibak.site;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # ─── 安全响应头 ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy $csp_header always;

    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api {
        set $backend "server:3000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 显式透传 Authorization（Bearer Token），确保后端 requireAuth 能稳定拿到登录态
        proxy_set_header Authorization $http_authorization;
        # 安全加固：限制请求体 + 缓冲
        client_max_body_size 10m;
        proxy_buffering on;
        proxy_read_timeout 60s;
        # 强制 UTF-8 编码，解决知识库等中文内容乱码问题
        charset utf-8;
    }
}


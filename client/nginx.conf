# ─── 安全响应头映射（所有 server 块公用） ───
map $uri $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

# 默认 catch-all（IP 直连 / 未知域名）— 正常服务，不强制 HTTPS
server {
    listen 80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ─── 安全响应头 ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy $csp_header always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $backend "server:3000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 10m;
        proxy_buffering on;
        proxy_read_timeout 60s;
        charset utf-8;
    }
}
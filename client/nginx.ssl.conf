# 生产 HTTPS 配置（阶段 0 上线使用）
# 用法：deploy/setup-https.sh 会自动把 __DOMAIN__ 替换为真实域名，
#       并将本文件挂载进 client 容器（无需重新构建镜像）。
# 证书放置路径：/opt/certs/fullchain.pem、/opt/certs/privkey.pem
# docker-compose.yml 中 client 服务已挂载：
#   - /opt/certs:/etc/nginx/certs:ro
#   - /opt/certs-webroot:/usr/share/nginx/html/.well-known/acme-challenge:ro
#   - ./client/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro

server {
    listen 80;
    server_name __DOMAIN__;
    # ACME 证书签发挑战（HTTP-01）必须走 HTTP，不能跳转
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    # 其余请求强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __DOMAIN__;

    # Docker 内置 DNS（运行时解析）
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代，用变量方式实现运行时 DNS 解析
    location /api {
        set $backend "server:3000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

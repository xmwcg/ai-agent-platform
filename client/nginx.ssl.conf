# 生产 HTTPS 配置（阶段2 上线使用）
# 用法：将证书放到服务器 /opt/certs/，并在 docker-compose.yml 的 client 服务中：
#   1) 将 COPY 配置改为挂载： volumes: - /opt/certs:/etc/nginx/certs:ro
#      并改用本文件： build 阶段改 COPY nginx.ssl.conf /etc/nginx/conf.d/default.conf
#   2) client ports 改为 "443:443"（可选保留 80 做跳转）
#   3) 把 server_name 改成你的域名

server {
    listen 80;
    server_name 你的域名;
    # HTTP 强制跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 你的域名;

    # Docker 内置 DNS（运行时解析）
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代，用变量方式实现运行时 DNS 解析
    location /api {
        set $backend "server:3000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

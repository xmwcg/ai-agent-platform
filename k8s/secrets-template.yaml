# ⚠️ 此文件为模板，真实密钥请使用 kubectl create secret 或外部密钥管理
apiVersion: v1
kind: Secret
metadata:
  name: ai-platform-secrets
  namespace: ai-agent-platform
type: Opaque
stringData:
  # 真实密钥需替换
  JWT_SECRET: "change-me-to-a-strong-random-string-at-least-32-chars"
  # 微信支付
  WECHAT_APP_ID: ""
  WECHAT_MCH_ID: ""
  WECHAT_API_V3_KEY: ""
  WECHAT_CERT_SERIAL_NO: ""
  WECHAT_PRIVATE_KEY_PATH: "/etc/certs/wechat/apiclient_key.pem"
  # 支付宝
  ALIPAY_APP_ID: ""
  ALIPAY_PRIVATE_KEY: ""
  ALIPAY_PUBLIC_KEY: ""
  # Stripe
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  # 微信登录
  WECHAT_OPEN_APPID: ""
  WECHAT_OPEN_SECRET: ""

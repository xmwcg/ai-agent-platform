main:
  push:
    - name: sync-to-github
      docker:
        image: alpine/git
      imports:
        - https://cnb.cool/aibak.site/cnb-github-migration-guide/-/blob/main/secrets.yml
      stages:
        - name: push
          script: |
            REPO_NAME=${CNB_REPO_SLUG##*/}
            git remote add github https://${GH_TOKEN}@github.com/xmwcg/${REPO_NAME}.git || true
            # 先普通推送；仅当快进失败（如历史上做过 rebase/强推）才用 --force-with-lease 受控强推，
            # 避免盲目 --force 误删 GitHub 上的提交。
            git push github main || git push github main --force-with-lease
  "crontab: 0 */4 * * *":
    - name: sync-from-github
      docker:
        image: alpine/git
      imports:
        - https://cnb.cool/aibak.site/cnb-github-migration-guide/-/blob/main/secrets.yml
      stages:
        - name: fetch-and-merge
          script: |
            REPO_NAME=${CNB_REPO_SLUG##*/}
            git remote add github https://${GH_TOKEN}@github.com/xmwcg/${REPO_NAME}.git || true
            git fetch github main
            git merge FETCH_HEAD -m "sync: merge from github" || true
            git push origin main


main:
  push:
    - name: production-release
      docker:
        image: node:20-bookworm
      imports:
        - https://cnb.cool/aibak.site/cnb-github-migration-guide/-/blob/main/secrets.yml
      env:
        PRODUCTION_BASE_URL: https://aibak.site
        DEPLOY_BRANCH: deploy/production
      stages:
        - name: server-quality-gate
          script: |
            set -eu
            cd server
            npm ci --no-audit --no-fund
            npx tsc --noEmit
            npm test

        - name: client-quality-gate
          script: |
            set -eu
            cd client
            npm install --no-audit --no-fund
            npm run build
            npm test

        - name: repository-consistency-gate
          script: |
            set -eu
            node scripts/check-superpowers-sync.cjs

        - name: mirror-github-safely
          script: |
            set -eu
            test -n "${GH_TOKEN:-}" || { echo "GH_TOKEN жңӘй…ҚзҪ®"; exit 1; }

            export GIT_TERMINAL_PROMPT=0
            git config user.name "cnb-release-bot"
            git config user.email "cnb-release-bot@users.noreply.github.com"
            git fetch --unshallow origin >/dev/null 2>&1 || true
            git remote remove github-mirror >/dev/null 2>&1 || true
            git remote add github-mirror "https://x-access-token:${GH_TOKEN}@github.com/xmwcg/${CNB_REPO_NAME}.git"

            if git fetch --prune github-mirror main; then
              github_sha=$(git rev-parse refs/remotes/github-mirror/main)
              if git merge-base --is-ancestor "$github_sha" "$CNB_COMMIT"; then
                echo "GitHub main еҸҜеҝ«иҝӣпјҢжү§иЎҢжҷ®йҖҡ push"
                git push github-mirror "$CNB_COMMIT:refs/heads/main"
              elif git diff --quiet "$github_sha" "$CNB_COMMIT"; then
                echo "GitHub дёҺ CNB еҶ…е®№дёҖиҮҙдҪҶеҺҶеҸІдёҚеҗҢпјҢжү§иЎҢеҸ—жҺ§ force-with-lease"
                git push github-mirror "$CNB_COMMIT:refs/heads/main" \
                  --force-with-lease="refs/heads/main:$github_sha"
              else
                echo "GitHub main еҗ« CNB жңӘеҢ…еҗ«зҡ„зӢ¬з«Ӣж”№еҠЁпјҢжӢ’з»қиҰҶзӣ–гҖӮиҜ·е…Ҳдәәе·ҘеҗҲе№¶еӣһ CNBгҖӮ"
                exit 1
              fi
            else
              echo "GitHub main е°ҡдёҚеӯҳеңЁпјҢеҲӣе»әй•ңеғҸеҲҶж”Ҝ"
              git push github-mirror "$CNB_COMMIT:refs/heads/main"
            fi

            mirrored_sha=$(git ls-remote github-mirror refs/heads/main | awk '{print $1}')
            test "$mirrored_sha" = "$CNB_COMMIT" || {
              echo "GitHub й•ңеғҸж ЎйӘҢеӨұиҙҘ: expected=$CNB_COMMIT actual=$mirrored_sha"
              exit 1
            }

        - name: promote-production-ref
          script: |
            set -eu
            test -n "${CNB_TOKEN:-}" || { echo "CNB_TOKEN жңӘй…ҚзҪ®"; exit 1; }

            export GIT_TERMINAL_PROMPT=0
            cnb_url="https://${CNB_TOKEN_USER_NAME}:${CNB_TOKEN}@${CNB_WEB_HOST}/${CNB_REPO_SLUG}.git"
            git remote remove cnb-release >/dev/null 2>&1 || true
            git remote add cnb-release "$cnb_url"

            if git fetch cnb-release "$DEPLOY_BRANCH"; then
              deployed_sha=$(git rev-parse FETCH_HEAD)
              git merge-base --is-ancestor "$deployed_sha" "$CNB_COMMIT" || {
                echo "з”ҹдә§еҸ‘еёғеҲҶж”ҜеҸ‘з”ҹйқһеҝ«иҝӣеҲҶеҸүпјҢжӢ’з»қиҮӘеҠЁиҰҶзӣ–"
                exit 1
              }
            fi

            git push cnb-release "$CNB_COMMIT:refs/heads/$DEPLOY_BRANCH"
            promoted_sha=$(git ls-remote cnb-release "refs/heads/$DEPLOY_BRANCH" | awk '{print $1}')
            test "$promoted_sha" = "$CNB_COMMIT" || {
              echo "CNB з”ҹдә§еҸ‘еёғеҲҶж”Ҝж ЎйӘҢеӨұиҙҘ: expected=$CNB_COMMIT actual=$promoted_sha"
              exit 1
            }

        - name: notify-webhook
          script: |
            set -u
            # жңҖдҪіеҠӘеҠӣйҖҡзҹҘз”ҹдә§жңҚеҠЎеҷЁз«ӢеҚіжЈҖжҹҘ deploy/production
            # еҚідҪҝ webhook еӨұиҙҘпјҢsystemd timer д№ҹдјҡеңЁ 1 еҲҶй’ҹеҶ…е…ңеә•иҪ®иҜў
            node -e '
            const crypto = require("crypto");
            const http = require("http");
            const payload = JSON.stringify({
              repository: process.env.CNB_REPO || "ai-agent-platform",
              branch: process.env.CNB_BRANCH || "main",
              commit: process.env.CNB_COMMIT || "",
              message: process.env.CNB_COMMIT_MESSAGE || ""
            });
            const secret = process.env.DEPLOY_SECRET || "cnb-deploy-secret-1784006404";
            const sig = "sha256=" + crypto.createHmac("sha256", secret).update(payload).digest("hex");
            const req = http.request({
              hostname: "159.75.124.59",
              port: 9000,
              path: "/deploy",
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CNB-Signature": sig,
                "Content-Length": Buffer.byteLength(payload)
              },
              timeout: 30000
            }, (res) => {
              let body = "";
              res.on("data", (chunk) => body += chunk);
              res.on("end", () => {
                console.log("webhook status:", res.statusCode, body);
                process.exit(0); // йқһйҳ»еЎһпјҢеӨұиҙҘз”ұ systemd timer е…ңеә•
              });
            });
            req.on("error", (err) => {
              console.log("webhook error:", err.message);
              process.exit(0); // йқһйҳ»еЎһ
            });
            req.write(payload);
            req.end();
            '

        - name: verify-production-release
          script: |
            set -eu
            node deploy/verify-release.mjs \
              --base-url "$PRODUCTION_BASE_URL" \
              --expected-sha "$CNB_COMMIT" \
              --timeout-seconds 900 \
              --interval-seconds 15

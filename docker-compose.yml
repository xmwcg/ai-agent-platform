version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ai-platform-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-agent-platform
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-platform-network
    # 安全加固：不对外暴露端口，仅 docker 内网可访问

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ai-platform-network
    # 安全加固：不对外暴露端口，仅 docker 内网可访问

  # 后端服务
  server:
    build: ./server
    container_name: ai-platform-server
    restart: unless-stopped
    # 仅本机回环可访问，便于健康检查；公网不可直达（由前端 nginx 反代）
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mongodb
      - redis
    # 仅保留基础设施变量；密钥与业务开关一律来自挂载的 server/.env
    # （Docker environment 会作为 process.env 注入且 dotenv 默认不覆盖，
    #   故切勿在此写 JWT_SECRET / ENABLE_MOCK_MODE / DEFAULT_PAY_PROVIDER，
    #   否则会覆盖 .env 中的真实值）
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/ai-agent-platform
      - REDIS_URL=redis://redis:6379
    # 运行时挂载生产 .env（不烤进镜像，避免密钥泄露到镜像层）
    volumes:
      - ./server/.env:/usr/src/app/.env:ro
      - server_uploads:/usr/src/app/uploads
    networks:
      - ai-platform-network

  # 前端服务（Nginx 托管静态 + 反代 /api 到 server）
  client:
    build: ./client
    container_name: ai-platform-client
    restart: unless-stopped
    ports:
      - "80:80"
      # 阶段0 HTTPS：暴露 443，证书由 deploy/setup-https.sh 签发并挂载
      - "443:443"
    depends_on:
      - server
    # 运行时挂载：SSL 配置 + 证书 + ACME 挑战目录（避免重新构建镜像）
    # 注意：nginx.ssl.runtime.conf 由 deploy/setup-https.sh 根据域名生成，
    #       不要手动 docker compose up，请先运行 setup-https.sh。
    volumes:
      - ./client/nginx.ssl.runtime.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/nginx/certs:ro
      - /opt/certs-webroot:/usr/share/nginx/html/.well-known/acme-challenge:ro
    networks:
      - ai-platform-network

networks:
  ai-platform-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  server_uploads:

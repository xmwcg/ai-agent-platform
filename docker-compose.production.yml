version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ai-platform-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-agent-platform
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-platform-network

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ai-platform-network

  sandbox-executor:
    image: ${BUILT_SANDBOX_IMAGE:-aibak-sandbox-executor:latest}
    container_name: ai-platform-sandbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:4090:4090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai-platform-network

  server:
    image: ${BUILT_SERVER_IMAGE:-ai-agent-platform-server:latest}
    container_name: ai-platform-server
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mongodb
      - redis
      - sandbox-executor
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');const r=h.get('http://127.0.0.1:3000/api/health',x=>process.exit(x.statusCode===200?0:1));r.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)"]
      interval: 15s
      timeout: 4s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/ai-agent-platform
      - REDIS_URL=redis://redis:6379
      - SANDBOX_REMOTE_URL=http://sandbox-executor:4090/run
      - APP_COMMIT_SHA=${APP_COMMIT_SHA:-unknown}
    volumes:
      - ./server/.env:/usr/src/app/.env:ro
      - server_uploads:/usr/src/app/uploads
    networks:
      - ai-platform-network

  client:
    image: ${BUILT_CLIENT_IMAGE:-ai-agent-platform-client:latest}
    container_name: ai-platform-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
    volumes:
      - ./client/nginx.ssl.runtime.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/certs:/etc/nginx/certs:ro
      - /opt/certs-webroot:/usr/share/nginx/html/.well-known/acme-challenge:ro
    networks:
      - ai-platform-network

networks:
  ai-platform-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  server_uploads:
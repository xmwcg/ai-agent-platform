name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      # client 依赖树庞大（antd/monaco/echarts 等），npm ci/npm install 在
      # GitHub runner 上稳定触发 npm 内部 OOM 崩溃 "Exit handler never called"
      # （已验证：Node 20/22 + npm ci/npm install + NODE_OPTIONS 4G/5G 均崩溃
      #  于 ~4 分钟，无论 maxsockets/retry 如何调整）。
      # 根因：下载解压 + postinstall 脚本并行执行时内存峰值超 runner 限制。
      # 方案：分阶段安装——先 --ignore-scripts 安装所有依赖（低内存），
      # 再 npm rebuild 单独跑脚本（时序分离，降低峰值）+ Node 22 + 6G 堆。
      - name: Install client deps (phased to avoid OOM)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm install --omit=optional --no-audit --no-fund --legacy-peer-deps --ignore-scripts ||
          npm install --omit=optional --no-audit --no-fund --legacy-peer-deps --ignore-scripts
          if [ ! -x node_modules/.bin/tsc ]; then
            echo "::error::npm install failed - node_modules incomplete"
            exit 1
          fi
      - name: Rebuild native addons
        run: npx -y npm rebuild 2>/dev/null || true
        continue-on-error: true
      # 直接使用本地安装的 TypeScript（package-lock 锁定 5.9.3），
      # 避免 `npx` 版本解析错乱（误装 tsc@2.0.4 或拉到 7.x）。
      # tsconfig 已移除 baseUrl，任何 TS 版本都不会触发 TS5101 弃用错误。
      - run: ./node_modules/.bin/tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

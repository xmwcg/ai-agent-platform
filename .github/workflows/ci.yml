name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      # client 依赖树庞大（antd/monaco/echarts 等），npm ci 在 GitHub runner 上
      # 偶发 npm 自身崩溃："Exit handler never called"（多为并发解压内存峰值 / 网络争用）。
      # 关键坑：该崩溃在部分 npm 版本下会「返回退出码 0」，导致 `||` 重试链不触发、
      # node_modules 安装不完整 → 后续 ./node_modules/.bin/tsc 缺失 → tsc 失败(127)。
      # 因此改用「带完整性校验的循环」：反复跑 npm ci，直到 tsc 二进制真正存在才视为成功；
      # 每次不完整都清掉 node_modules 重来，最多 5 次，彻底兜住该假成功崩溃。
      - name: Install client deps (retry until ready)
        run: |
          for i in 1 2 3 4 5; do
            npm ci --omit=optional --no-audit --no-fund || true
            if [ -x node_modules/.bin/tsc ]; then
              echo "install OK on attempt $i"
              break
            fi
            echo "attempt $i incomplete (npm crashed?), retrying..."
            rm -rf node_modules
            sleep 5
          done
          if [ ! -x node_modules/.bin/tsc ]; then
            echo "::error::client deps failed to install after retries"
            exit 1
          fi
      # 直接使用 npm ci 安装的本地 TypeScript（package-lock 锁定 5.9.3），
      # 避免 `npx` 版本解析错乱（误装 tsc@2.0.4 或拉到 7.x）。
      # tsconfig 已移除 baseUrl，任何 TS 版本都不会触发 TS5101 弃用错误。
      - run: ./node_modules/.bin/tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

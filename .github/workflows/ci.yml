name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      # client 依赖树庞大（antd/monaco/echarts 等），npm ci 在 GitHub runner 上
      # 偶发 npm 内部 OOM 崩溃："Exit handler never called"。
      # 关键坑：该崩溃在部分 npm 版本下「返回退出码 0」，导致 `||` 重试链不触发、
      # node_modules 不完整 → 后续 tsc 报 127。
      # 缓解手段：
      #  - NODE_OPTIONS=4096M 给 npm 更多堆内存（runner 7GB，给 4G 安全）
      #  - client/.npmrc maxsockets=4 降低并行解压内存峰值
      #  - `||` 链兜底真实非零退出；完整性检查兜底假成功崩溃，快速失败不盲目重试
      - name: Install client deps
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci --omit=optional --no-audit --no-fund ||
          npm ci --omit=optional --no-audit --no-fund ||
          npm ci --omit=optional --no-audit --no-fund
          if [ ! -x node_modules/.bin/tsc ]; then
            echo "::error::npm ci completed but node_modules is incomplete (known npm OOM bug)"
            exit 1
          fi
      # 直接使用 npm ci 安装的本地 TypeScript（package-lock 锁定 5.9.3），
      # 避免 `npx` 版本解析错乱（误装 tsc@2.0.4 或拉到 7.x）。
      # tsconfig 已移除 baseUrl，任何 TS 版本都不会触发 TS5101 弃用错误。
      - run: ./node_modules/.bin/tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

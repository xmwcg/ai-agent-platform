name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      # client 依赖树庞大（antd 等），npm ci 在 runner 上偶发 npm 内部崩溃
      # ("Exit handler never called"，多为 OOM / 网络并发争用)。
      # 缓解手段：
      #  - client/.npmrc 已把并发降到 1 并加大重试（maxsockets=1）
      #  - --omit=optional 跳过 esbuild 等可选原生二进制（tsc/lint 用不到），
      #    大幅缩减安装体积与内存占用，避免安装期 OOM
      #  - 优先使用缓存离线包 + 多次重试
      # 注意：NODE_OPTIONS 大内存仅留给 tsc/lint 步骤，npm ci 阶段不预留，
      # 避免安装期过度占用内存反而触发 OOM。
      - run: >-
          npm ci --omit=optional --prefer-offline ||
          npm ci --omit=optional --prefer-offline ||
          npm ci --omit=optional
      # 直接使用 npm ci 安装的本地 TypeScript（package-lock 锁定 5.9.3），
      # 避免 `npx` 版本解析错乱（误装 tsc@2.0.4 或拉到 7.x）。
      # tsconfig 已移除 baseUrl，任何 TS 版本都不会触发 TS5101 弃用错误。
      - run: ./node_modules/.bin/tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

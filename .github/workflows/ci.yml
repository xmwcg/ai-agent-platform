name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      # client 依赖树庞大（antd/monaco/echarts 等），npm ci 在 GitHub runner 上
      # 稳定触发 npm 内部 OOM 崩溃 "Exit handler never called"（已验证：Node 20
      # + npm 10.8，无论 maxsockets=3/5/8/15 及 NODE_OPTIONS 4096M 均崩溃于 4 分钟）。
      # 根因：npm ci 先 rm -rf node_modules 再全量安装，并行解压内存峰值超过了
      # GitHub runner 的 7GB 限制。
      # 改用 npm install（不同内部代码路径，增量安装，内存峰值更低）+
      # Node 22（V8 内存管理更优）+ 5G 堆上限。
      - name: Install client deps
        env:
          NODE_OPTIONS: --max-old-space-size=5120
        run: |
          npm install --omit=optional --no-audit --no-fund --legacy-peer-deps ||
          npm install --omit=optional --no-audit --no-fund --legacy-peer-deps
          if [ ! -x node_modules/.bin/tsc ]; then
            echo "::error::npm install failed - node_modules incomplete"
            exit 1
          fi
      # 直接使用本地安装的 TypeScript（package-lock 锁定 5.9.3），
      # 避免 `npx` 版本解析错乱（误装 tsc@2.0.4 或拉到 7.x）。
      # tsconfig 已移除 baseUrl，任何 TS 版本都不会触发 TS5101 弃用错误。
      - run: ./node_modules/.bin/tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - run: npm run lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

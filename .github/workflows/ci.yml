name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# 全局提高 Node 内存上限，避免 client 庞大的依赖树（antd 等）
# 在 runner 上触发 npm 内部崩溃（"Exit handler never called"）。
env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  server:
    runs-on: ubuntu-latest
    # 测试所需的非敏感环境变量（仅为让 CI 能跑通登录/加密等逻辑，非生产密钥）
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production-000000
      ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund
      # 显式锁定 TypeScript 5.9.3（与 package-lock 一致）：
      # - 避免 `npx -p typescript` 拉到最新 7.x 把 baseUrl 当硬错误（TS5101）
      # - 避免 `npx tsc` 误装占位包 tsc@2.0.4
      - run: npx -p typescript@5.9.3 tsc --noEmit
      - run: npm run lint

  superpowers-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-superpowers-sync.cjs

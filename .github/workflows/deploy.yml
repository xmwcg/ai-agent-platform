name: Deploy to Server

# 部署主源已切换为 cnb.cool（服务器 cnb-watcher.sh 主动轮询拉取部署，规避安全组入站拦截）。
# 本工作流保留为手动兜底：仅当 cnb.cool 不可用时，才在 GitHub 网页手动点按钮触发部署。
# 注意：不再监听 push 自动触发，避免与 cnb.cool 主源拉取部署造成双部署/竞争。
on:
  workflow_dispatch: {}   # 仅手动触发

# 同一时间只跑一个部署，避免并发互相踩踏
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整代码历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 必须完整历史，才能 push 到服务器裸仓库

      - name: 配置服务器 SSH 部署密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 159.75.124.59 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 推送到服务器（触发自动部署）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
          git remote add prod ssh://root@159.75.124.59/opt/ai-agent-platform.git || \
            git remote set-url prod ssh://root@159.75.124.59/opt/ai-agent-platform.git
          echo "==> 推送 $GITHUB_SHA 到服务器 main，服务器将自动构建部署"
          git push prod HEAD:main

      - name: 部署已触发
        run: echo "已推送到服务器，服务器 post-receive 钩子正在后台构建部署（约 2-5 分钟上线）。"

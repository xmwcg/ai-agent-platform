# New API 网关 nginx 子路径反代
# 追加到 /etc/nginx/conf.d/ 下 aibak.site 的配置，或新建 ai-gateway.conf
# 复用金网通 /jinwangtong/ 同款 location 模式

# 斜杠跳转（与 /jinwangtong 同款）
location = /ai-gateway {
    return 302 /ai-gateway/;
}

location /ai-gateway/ {
    proxy_pass http://127.0.0.1:3005/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # New API 子路径需识别 base URL，避免静态资源 404
    proxy_set_header X-Forwarded-Prefix /ai-gateway;
    proxy_redirect off;
    client_max_body_size 32m;
}
